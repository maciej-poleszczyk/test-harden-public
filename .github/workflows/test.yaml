name: Test Workflow

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit
      - name: Test
       run: |
         curl https://google.com
